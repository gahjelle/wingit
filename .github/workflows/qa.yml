name: QA

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install just
        run: uv tool install rust-just

      - name: Install dependencies
        run: uv sync

      - name: Check
        run: just check
