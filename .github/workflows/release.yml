name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions: {}

jobs:
  # Re-verify the tagged SHA: a tag can sit on any commit, so never publish
  # something the gates have not passed here.
  check:
    name: Re-check the tagged commit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          # No caching in the release path: a cache poisoned by an untrusted
          # run must not be able to influence a published artifact.
          enable-cache: false

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install just
        run: uv tool install rust-just

      - name: Install dependencies
        run: uv sync

      - name: Check
        run: just check

  build:
    name: Build distributions
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          # No caching in the release path: a cache poisoned by an untrusted
          # run must not be able to influence a published artifact.
          enable-cache: false

      - name: Build sdist and wheel
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The `pypi` Environment's required-reviewer rule is the human approval
    # before this irreversible upload. See
    # docs/adr/0009-gated-tag-triggered-release-workflow.md.
    environment: pypi
    permissions:
      id-token: write # OIDC token for PyPI trusted publishing; no long-lived API token.
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
